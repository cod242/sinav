<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnkılap Tarihi - İnteraktif Sınav Platformu</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #1a2a3a;
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --success: #2ecc71;
            --white: #ffffff;
            --border: #dcdde1;
            --shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        
        [data-theme="dark"] {
            --bg-color: #121824;
            --text-color: #e4e6eb;
            --primary: #1e293b;
            --secondary: #60a5fa;
            --accent: #ef4444;
            --white: #1e293b;
            --border: #334155;
            --shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        /* Giriş Ekranı ve Animasyonlar */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a2a3a, #2c3e50);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        #intro-overlay.hidden { opacity: 0; visibility: hidden; }

        .pulsing-circle {
            width: 100px;
            height: 100px;
            background: var(--secondary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 2s infinite;
            margin-bottom: 30px;
            color: white;
            font-size: 2rem;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(52, 152, 219, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 152, 219, 0); }
        }

        .btn-glow {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
            transition: 0.3s;
        }
        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(52, 152, 219, 0.6); }

        /* Ana Kart ve Düzen */
        .app-card {
            background: var(--white);
            width: 100%;
            max-width: 800px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--secondary); }

        .theme-btn {
            background: var(--border);
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-color);
            font-weight: bold;
        }

        /* Soru Kartları */
        .question-card {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            transition: transform 0.3s;
        }
        .question-card:hover { transform: translateY(-3px); }

        .q-title { font-weight: 600; margin-bottom: 15px; font-size: 1.1rem; }

        /* Gelişmiş Kalem Modu */
        .canvas-area { position: relative; margin-bottom: 15px; }
        
        canvas {
            width: 100%;
            height: 180px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: crosshair;
            touch-action: none; /* Mobilde kaydırmayı önler */
        }
        
        [data-theme="dark"] canvas { background: #2b3a4a; }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tool-btn:hover { background: var(--secondary); color: white; }

        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

        /* Cevap Bölümü */
        .answer-box {
            display: none;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid var(--success);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.95rem;
            animation: fadeIn 0.4s;
            color: var(--text-color);
        }
        [data-theme="dark"] .answer-box { background: rgba(46, 204, 113, 0.05); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 10px;
        }

        .btn-primary { background: var(--secondary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; flex: 1; }
        .btn-success { background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; flex: 1; }
        .btn-primary:hover, .btn-success:hover { opacity: 0.9; }

        /* Modal Pencere */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            padding: 15px;
        }
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes pop { from { transform: scale(0.8); } to { transform: scale(1); } }
        
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        
        /* Dualar Alt Kısım */
        .dua-bar {
            margin-top: 30px;
            font-size: 0.85rem;
            text-align: center;
            opacity: 0.8;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        /* Mobil Optimizasyon */
        @media (max-width: 600px) {
            .app-card { padding: 15px; }
            .btn-group { flex-direction: column; }
            .toolbar { justify-content: center; }
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div class="pulsing-circle">🎯</div>
    <h2 style="color: white; margin-bottom: 20px;">İnkılap Tarihi Sınav Simülatörü</h2>
    <button class="btn-glow" onclick="startApp()">Başla</button>
</div>

<div class="app-card">
    <header>
        <h1 id="exam-title">Aşama 1: Laiklik İlkesi Sınavı</h1>
        <button class="theme-btn" onclick="toggleTheme()">🌓 Tema</button>
    </header>

    <div id="questions-container">
        </div>

    <div class="btn-group">
        <button class="btn-success" onclick="finishExam()">Sınavı Bitir</button>
    </div>

    <div class="dua-bar">
        📿 Rabbi zidnî ilmen ve fehmen (Rabbim! İlmimi ve anlayışımı artır.)
    </div>
</div>

<div class="modal" id="next-exam-modal">
    <div class="modal-content">
        <h3>Tebrikler! 🎉</h3>
        <p>1. Sınavı başarıyla bitirdin. 2. Sınava geçmek istiyor musun?</p>
        <div class="modal-btns">
            <button class="btn-success" onclick="loadExam(2)">Evet, Geçelim!</button>
            <button style="background: var(--border); color: var(--text-color);" onclick="closeModal()">Burada Bitir</button>
        </div>
    </div>
</div>

<script>
    // Sınav Veritabanı
    const exams = {
        1: {
            title: "Aşama 1: Laiklik İlkesi Sınavı",
            questions: [
                {
                    title: "Soru 1: Laiklik ilkesinin din ve devlet işlerinin ayrılması dışındaki en büyük toplumsal faydası nedir?",
                    ans: "Vatandaşların din, vicdan ve ibadet hürriyetini garanti altına alarak toplumda farklı inançlara sahip insanların barış içinde yaşamasını sağlar."
                },
                {
                    title: "Soru 2: 3 Mart 1924'te kabul edilen Tevhid-i Tedrisat Kanunu'nun laik eğitim için önemi nedir?",
                    ans: "Eğitimi tek elde toplayarak medrese ve dini ağırlıklı eğitimi sonlandırmış, akılcı, bilimsel ve çağdaş bir müfredatın temelini atmıştır."
                }
            ]
        },
        2: {
            title: "Aşama 2: Cumhuriyetçilik ve Kadın Hakları",
            questions: [
                {
                    title: "Soru 1: 1934 yılında kadınlara milletvekili seçme ve seçilme hakkının verilmesi hangi iki ilkeyle doğrudan bağdaşır?",
                    ans: "Ulusal egemenliği halkın tamamına yaydığı için **Cumhuriyetçilik**, kadın ve erkek arasında siyasi eşitlik sağladığı için **Halkçılık** ilkesiyle bağdaşır."
                },
                {
                    title: "Soru 2: 1926 Medeni Kanunu ile kadınlara verilmeyen, daha sonraki yıllarda verilen hak hangisidir?",
                    ans: "Kadınlara Medeni Kanun ile sosyal ve ekonomik haklar verilmiş ancak **Siyasi Haklar** (Seçme ve seçilme) verilmemiştir. Siyasi haklar 1930'dan sonra verilmiştir."
                }
            ]
        }
    };

    let currentExam = 1;

    function startApp() {
        document.getElementById('intro-overlay').classList.add('hidden');
        loadExam(1);
    }

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        body.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
    }

    // Dinamik Sınav Yükleme
    function loadExam(examId) {
        currentExam = examId;
        closeModal();
        const data = exams[examId];
        document.getElementById('exam-title').innerText = data.title;
        
        const container = document.getElementById('questions-container');
        container.innerHTML = ''; // Temizle

        data.questions.forEach((q, index) => {
            const id = `canvas-${examId}-${index}`;
            const html = `
                <div class="question-card">
                    <div class="q-title">${q.title}</div>
                    
                    <div class="canvas-area">
                        <canvas id="${id}"></canvas>
                        <div class="toolbar">
                            <button class="tool-btn" onclick="clearCanvas('${id}')">🧹 Temizle</button>
                            <button class="tool-btn" onclick="setColor('${id}', '#000000')"><span class="color-dot" style="background:#000;"></span> Siyah</button>
                            <button class="tool-btn" onclick="setColor('${id}', '#e74c3c')"><span class="color-dot" style="background:#e74c3c;"></span> Kırmızı</button>
                            <button class="tool-btn" onclick="setColor('${id}', '#3498db')"><span class="color-dot" style="background:#3498db;"></span> Mavi</button>
                            <button class="tool-btn" style="background: #2ecc71; color: white;" onclick="toggleAnswer('ans-${examId}-${index}')">👁️ Cevabı Gör</button>
                        </div>
                    </div>

                    <div class="answer-box" id="ans-${examId}-${index}">
                        <b>Doğru Cevap Anahtarı:</b><br>${q.ans}
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            setupCanvas(id);
        });
    }

    // Gelişmiş Kalem Kodu
    const canvasSettings = {};

    function setupCanvas(canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        
        // Boyutlandırma
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        canvasSettings[canvasId] = { color: '#000000', lineWidth: 2 };
        
        let drawing = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function start(e) { drawing = true; draw(e); }
        function end() { drawing = false; ctx.beginPath(); }
        
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            
            ctx.lineWidth = canvasSettings[canvasId].lineWidth;
            ctx.lineCap = 'round';
            ctx.strokeStyle = canvasSettings[canvasId].color;
            
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', end);
        
        canvas.addEventListener('touchstart', start, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', end);
    }

    function clearCanvas(id) {
        const canvas = document.getElementById(id);
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }

    function setColor(id, color) {
        canvasSettings[id].color = color;
    }

    function toggleAnswer(ansId) {
        const box = document.getElementById(ansId);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function finishExam() {
        if (currentExam === 1) {
            document.getElementById('next-exam-modal').style.display = 'flex';
        } else {
            alert("Tüm aşamaları başarıyla tamamladın! 💯 Harikasın.");
        }
    }

    function closeModal() {
        document.getElementById('next-exam-modal').style.display = 'none';
    }
</script>

</body>
</html>
